<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürpriz Soru!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f3e5f5, #fce4ec);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Ekranın kaymasını engeller */
            text-align: center;
        }

        #mainContainer {
            background-color: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            width: 85%;
            max-width: 400px;
        }

        h1 {
            color: #4a148c;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            flex-direction: column; /* Mobilde alt alta dursunlar diye */
            gap: 15px;
            align-items: center;
            position: relative;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%; /* Butonlar kutuyu doldursun */
            max-width: 250px;
            -webkit-tap-highlight-color: transparent; /* Mobilde tıklama parlaklığını kaldırır */
        }

        #uglyBtn {
            background-color: #ce93d8;
            color: white;
        }

        #uglyBtn:hover, #uglyBtn:active {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(206, 147, 216, 0.5);
        }

        #handsomeBtn {
            background-color: #f48fb1;
            color: white;
            position: relative;
            z-index: 20;
        }

        #birthdayScreen {
            display: none;
            padding: 20px;
        }

        #birthdayScreen h1 {
            font-size: 40px;
            color: #d81b60;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        #birthdayScreen p {
            font-size: 20px;
            color: #6a1b9a;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="mainContainer">
        <h1>Henry Cavill yakışıklı mı çirkin mi? 🤔</h1>
        <div class="button-container">
            <button id="handsomeBtn">Yakışıklı</button>
            <button id="uglyBtn">Çirkin</button>
        </div>
    </div>

    <div id="birthdayScreen">
        <h1>🎉 İyi ki doğdun Sena! 🎂</h1>
        <p>Görünüşe göre doğru cevabı buldun! 😄</p>
    </div>

    <script>
        const handsomeBtn = document.getElementById('handsomeBtn');
        const uglyBtn = document.getElementById('uglyBtn');
        const mainContainer = document.getElementById('mainContainer');
        const birthdayScreen = document.getElementById('birthdayScreen');

        // Kaçma fonksiyonu
        function moveButton(e) {
            // Eğer mobilden dokunuluyorsa, tıklama işlemini tamamen engelle
            if(e.type === 'touchstart') {
                e.preventDefault();
            }

            handsomeBtn.style.position = 'fixed';
            
            // Butonun ekranın dışına taşmasını engellemek için güvenli alan hesaplıyoruz
            const padding = 20;
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const buttonWidth = handsomeBtn.offsetWidth;
            const buttonHeight = handsomeBtn.offsetHeight;

            const maxX = windowWidth - buttonWidth - padding;
            const maxY = windowHeight - buttonHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            handsomeBtn.style.left = randomX + 'px';
            handsomeBtn.style.top = randomY + 'px';
        }

        // Hem bilgisayarda fare ile üzerine gelince hem de telefonda dokunmaya çalışınca kaçsın
        handsomeBtn.addEventListener('mouseover', moveButton);
        handsomeBtn.addEventListener('touchstart', moveButton, {passive: false});
        
        // Kazara tıklanmayı tamamen iptal et
        handsomeBtn.addEventListener('click', function(e) {
            e.preventDefault();
        });

        // Çirkin butonuna tıklandığında (veya telefonda dokunulduğunda)
        uglyBtn.addEventListener('click', function() {
            mainContainer.style.display = 'none';
            handsomeBtn.style.display = 'none';
            birthdayScreen.style.display = 'block';

            // Konfeti Efekti
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        });
    </script>
</body>
</html>
