<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürpriz Soru!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f3e5f5, #fce4ec);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        #mainContainer {
            background-color: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            width: 85%;
            max-width: 400px;
        }

        h1 {
            color: #4a148c;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            position: relative;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            max-width: 250px;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        /* Tıklanınca veya dokunulunca butonun içine göçmesi */
        button:active, .pressed {
            transform: scale(0.90) !important;
            box-shadow: inset 0 6px 12px rgba(0,0,0,0.3) !important;
        }

        #uglyBtn {
            background-color: #ce93d8;
            color: white;
            box-shadow: 0 5px 15px rgba(206, 147, 216, 0.4);
        }

        #handsomeBtn {
            background-color: #f48fb1;
            color: white;
            box-shadow: 0 5px 15px rgba(244, 143, 177, 0.4);
        }

        #birthdayScreen {
            display: none;
            padding: 20px;
        }

        #birthdayScreen h1 {
            font-size: 40px;
            color: #d81b60;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        #birthdayScreen p {
            font-size: 20px;
            color: #6a1b9a;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="mainContainer">
        <h1>Henry Cavill yakışıklı mı çirkin mi? 🤔</h1>
        <div class="button-container">
            <button id="handsomeBtn">Yakışıklı</button>
            <button id="uglyBtn">Çirkin</button>
        </div>
    </div>

    <div id="birthdayScreen">
        <h1>🎉 İyi ki doğdun Sena! 🎂</h1>
        <p>Görünüşe göre doğru cevabı buldun! 😄</p>
    </div>

    <script>
        const handsomeBtn = document.getElementById('handsomeBtn');
        const uglyBtn = document.getElementById('uglyBtn');
        const mainContainer = document.getElementById('mainContainer');
        const birthdayScreen = document.getElementById('birthdayScreen');

        let isFirstMove = true;

        function moveButton(e) {
            if(e.type === 'touchstart') {
                e.preventDefault();
            }

            const rect = handsomeBtn.getBoundingClientRect();

            if (isFirstMove) {
                handsomeBtn.style.transition = 'none';
                handsomeBtn.style.position = 'fixed';
                handsomeBtn.style.left = rect.left + 'px';
                handsomeBtn.style.top = rect.top + 'px';
                handsomeBtn.style.width = rect.width + 'px';
                handsomeBtn.style.zIndex = '100';
                isFirstMove = false;
                
                handsomeBtn.offsetHeight; 
                handsomeBtn.style.transition = 'left 0.4s ease-out, top 0.4s ease-out, transform 0.1s ease';
            }
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const padding = 20;

            const maxX = windowWidth - rect.width - padding;
            const maxY = windowHeight - rect.height - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            handsomeBtn.style.left = randomX + 'px';
            handsomeBtn.style.top = randomY + 'px';
        }

        handsomeBtn.addEventListener('mouseover', moveButton);
        handsomeBtn.addEventListener('touchstart', moveButton, {passive: false});
        
        handsomeBtn.addEventListener('click', function(e) {
            e.preventDefault();
        });

        // MOBİL İÇİN DOKUNMA EFEKTİNİ GÜÇLENDİRİYORUZ
        uglyBtn.addEventListener('touchstart', function() {
            this.classList.add('pressed');
        });

        uglyBtn.addEventListener('touchend', function() {
            this.classList.remove('pressed');
        });

        // ÇİRKİN BUTONUNA TIKLANINCA OLACAKLAR
        uglyBtn.addEventListener('click', function() {
            
            // Butona tıklandığının görünmesi için 0.3 saniye (300 ms) bekletiyoruz
            setTimeout(function() {
                mainContainer.style.display = 'none';
                handsomeBtn.style.display = 'none';
                birthdayScreen.style.display = 'block';

                // Konfeti Efekti
                var duration = 5 * 1000;
                var animationEnd = Date.now() + duration;
                var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

                function randomInRange(min, max) {
                    return Math.random() * (max - min) + min;
                }

                var interval = setInterval(function() {
                    var timeLeft = animationEnd - Date.now();

                    if (timeLeft <= 0) {
                        return clearInterval(interval);
                    }

                    var particleCount = 50 * (timeLeft / duration);
                    
                    confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                    confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
                }, 250);
            }, 300); // <-- İşte bu gecikme sayesinde tıklama hissi yaşanıyor
        });
    </script>
</body>
</html>
